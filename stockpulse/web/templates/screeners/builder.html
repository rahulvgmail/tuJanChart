{% extends "base.html" %}
{% block title %}Screener Builder - StockPulse{% endblock %}

{% block content %}
<h1>Screener Builder</h1>

<div x-data="screenerBuilder()">
    <div class="builder-layout">
        <section>
            <h3>Conditions</h3>
            <template x-for="(cond, idx) in conditions" :key="idx">
                <div class="condition-row">
                    <select x-model="cond.field">
                        <option value="">-- field --</option>
                        {% for f in fields %}
                        <option value="{{ f }}">{{ f }}</option>
                        {% endfor %}
                        <option value="color">color</option>
                    </select>
                    <select x-model="cond.operator">
                        <option value="">-- op --</option>
                        <option value="is_true">is_true</option>
                        <option value="is_false">is_false</option>
                        <option value="eq">eq</option>
                        <option value="neq">neq</option>
                        <option value="gt">gt</option>
                        <option value="gte">gte</option>
                        <option value="lt">lt</option>
                        <option value="lte">lte</option>
                        <option value="in">in</option>
                        <option value="gt_field">gt_field</option>
                        <option value="lt_field">lt_field</option>
                        <option value="gte_field">gte_field</option>
                    </select>
                    <input type="text" x-model="cond.value" placeholder="value"
                           x-show="!['is_true', 'is_false'].includes(cond.operator)">
                    <button class="outline secondary btn-sm" @click="removeCondition(idx)">X</button>
                </div>
            </template>
            <button class="outline" @click="addCondition()">+ Add Condition</button>
            <br><br>
            <button @click="preview()">Preview Results</button>
        </section>

        <section>
            <h3>Save Screener</h3>
            <label for="scr-name">Name</label>
            <input type="text" id="scr-name" x-model="name">
            <label for="scr-desc">Description</label>
            <input type="text" id="scr-desc" x-model="description">
            <label for="scr-cat">Category</label>
            <input type="text" id="scr-cat" x-model="category" value="custom">
            <button @click="save()">Save Screener</button>
        </section>
    </div>

    <hr>
    <h3>Preview (<span x-text="previewCount">0</span> results)</h3>
    <div id="preview-results" x-html="previewHtml"></div>
</div>

{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('web.static', filename='js/screener-builder.js') }}"></script>
{% endblock %}
