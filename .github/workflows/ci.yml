name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockpulse
          POSTGRES_PASSWORD: stockpulse
          POSTGRES_DB: stockpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockpulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://stockpulse:stockpulse@localhost:5432/stockpulse_test
      TEST_DATABASE_URL: postgresql://stockpulse:stockpulse@localhost:5432/stockpulse_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      FLASK_ENV: testing

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/ --cov=stockpulse --cov-report=term-missing --cov-report=xml -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
