services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: stockpulse
      POSTGRES_DB: stockpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: uv run flask run --host=0.0.0.0 --port=5000 --reload
    environment:
      FLASK_APP: main:create_app_wrapper
      FLASK_ENV: development
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: postgresql://stockpulse:stockpulse@db:5432/stockpulse
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    command: uv run celery -A stockpulse.extensions:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://stockpulse:stockpulse@db:5432/stockpulse
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    command: uv run celery -A stockpulse.extensions:celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://stockpulse:stockpulse@db:5432/stockpulse
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
